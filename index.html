<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Құлыншақ — Шахматты ойнап үйрен</title>
<link rel="stylesheet" href="styles.css?v=010">
<script src="vendor/react.min.js?v=010"></script>
<script src="vendor/react-dom.min.js?v=010"></script>
<script src="vendor/babel.min.js?v=010"></script>
<script src="vendor/three.min.js?v=010"></script>
<script src="_ds_bundle.js?v=010"></script>
<script src="config.js?v=010"></script>
<style>
  /* ҚАРАҢҒЫ ҚАБЫҚ: крем фон толық алынып, астында 3D фанера-шахмат көрінісі жатады.
     Түс токендері «шыны панель» палитрасына қайта анықталады. */
  :root {
    --paper:      rgba(22, 24, 27, 0.60);
    --paper-deep: rgba(17, 19, 22, 0.55);
    --paper-hi:   rgba(28, 31, 35, 0.86);
    --surface:    rgba(28, 31, 35, 0.86);
    --surface-2:  rgba(34, 38, 43, 0.92);
    --bg:         rgba(22, 24, 27, 0.0);
    --bg-sunk:    rgba(17, 19, 22, 0.55);
    --ink:   #EFE7D8;
    --ink-2: #D8CEBA;
    --ink-3: #A49F93;
    --ink-4: #75705F;
    --text:  #EFE7D8;
    --text-muted: #A49F93;
    --line: #3A3F46;
    --line-strong: #EFE7D8;
    --border: #3A3F46;
    --border-ink: #EFE7D8;
    --amber-100: rgba(224, 180, 107, 0.12);
    --brand-soft: rgba(224, 180, 107, 0.14);
    --square-light: #EFE4C4;
    --square-dark: #4C6653;
    --logo-knight: #FCF8EF;
    --stat-color: #35F2D5;
    --stat-glow: 0 0 10px rgba(53, 242, 213, 0.85), 0 0 26px rgba(53, 242, 213, 0.45);
    --stat-label: #D8CEBA;
    --hero-note-bg: linear-gradient(135deg, rgba(252, 248, 239, 0.97), rgba(239, 228, 196, 0.88));
    --hero-note-ink: #211D1A;
    --hero-note-pad: 14px 18px;
    --piece-black: #211D1A;
    --piece-white: #FCF8EF;
    --coord-light: #EFE4C4;
    --coord-dark: #6E6046;
    --disc-paper: #FCF8EF;
    --disc-brand: #FBEBC9;
    --disc-teal: #D6E7E7;
    --callout-body: #4A423B;
    --callout-rule-bg: #ECE1C8;
    --callout-rule-fg: #4A423B;
    --callout-rule-strip: #211D1A;
    --callout-fun-bg: #FBEBC9;
    --header-bg: rgba(20, 22, 25, 0.78);
    --footer-bg: rgba(14, 16, 18, 0.85);
    --footer-link: #EFE7D8;
    --footer-title: #EFE7D8;
    --footer-dim: #A49F93;
  }
  html { background: radial-gradient(120% 120% at 50% 0%, #202429, #16181b 70%); }
  body { margin: 0; background: transparent !important; }
  #bg3d { position: fixed; inset: 0; z-index: 0; }
  #bg3d canvas { display: block; pointer-events: none; }
  #veil {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(16,18,20,.62), rgba(16,18,20,.24) 32%, rgba(16,18,20,.5) 100%);
  }
  #root { position: relative; z-index: 1; }
  header { backdrop-filter: blur(10px); }
  .panel-light {
    --panel-light-bg: #ECE1C8;
    --panel-light-pad: 18px 20px;
    --ink: #211D1A; --ink-2: #4A423B; --ink-3: #7A6F63; --ink-4: #A99C8B;
    --paper-hi: #FCF8EF; --line: #D8CBAE;
  }
  .mobile-content { padding-bottom: 66px; }
  .mobile-tabs {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; display: flex; background: var(--paper-hi);
    backdrop-filter: blur(10px);
    border-top: 2px solid var(--line); padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  .mobile-tabs button {
    flex: 1; border: none; background: none; cursor: pointer; padding: 6px 2px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font: 700 11px var(--font-display); color: var(--ink-3);
  }
  .mobile-tabs button[data-on="true"] { color: var(--amber-400); }
  .mobile-tabs .ic { font-size: 20px; }
</style>
</head>
<body>
<div id="bg3d"></div>
<div id="veil"></div>
<div id="root"></div>
<script src="bg3d.js?v=010"></script>
<script src="ui_kits/website/data.js?v=010"></script>
<script type="text/babel" src="ui_kits/website/Chrome.jsx?v=010" data-filename="Chrome.jsx"></script>
<script type="text/babel" src="ui_kits/website/MoveBoard.jsx?v=010" data-filename="MoveBoard.jsx"></script>
<script type="text/babel" src="ui_kits/website/HomeScreen.jsx?v=010" data-filename="HomeScreen.jsx"></script>
<script type="text/babel" src="ui_kits/website/LearnScreen.jsx?v=010" data-filename="LearnScreen.jsx"></script>
<script type="text/babel" src="ui_kits/website/LessonScreen.jsx?v=010" data-filename="LessonScreen.jsx"></script>
<script type="text/babel" src="ui_kits/website/AssemblyScreen.jsx?v=010" data-filename="AssemblyScreen.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  function useIsMobile() {
    const [mobile, setMobile] = useState(() => window.matchMedia('(max-width: 768px)').matches);
    useEffect(() => {
      const mq = window.matchMedia('(max-width: 768px)');
      const onChange = (e) => setMobile(e.matches);
      mq.addEventListener('change', onChange);
      return () => mq.removeEventListener('change', onChange);
    }, []);
    return mobile;
  }

  function Screens({ route, lesson, nav, open, mobile }) {
    switch (route) {
      case 'learn':    return <LearnScreen onOpen={open} mobile={mobile} />;
      case 'lesson':   return <LessonScreen lesson={lesson} onNav={nav} onOpen={open} mobile={mobile} />;
      case 'assembly': return <AssemblyScreen onNav={nav} mobile={mobile} />;
      case 'order':    return <OrderScreen onNav={nav} mobile={mobile} />;
      default:         return <HomeScreen onNav={nav} mobile={mobile} />;
    }
  }

  function MobileTabs({ route, nav }) {
    const tabs = [['home','⌂','Басты'],['learn','♞','Сабақ'],['assembly','✂','Құру'],['order','🛒','Алу']];
    return (
      <div className="mobile-tabs">
        {tabs.map(([k, ic, label]) => (
          <button key={k} data-on={route === k} onClick={() => nav(k)}>
            <span className="ic">{ic}</span>{label}
          </button>
        ))}
      </div>
    );
  }

  function App() {
    const [route, setRoute] = useState('home');
    const [lesson, setLesson] = useState(null);
    const mobile = useIsMobile();

    const scrollTop = () => window.scrollTo(0, 0);
    const nav = (r) => { setRoute(r); setTimeout(scrollTop, 0); };
    const open = (l) => { setLesson(l); setRoute('lesson'); setTimeout(scrollTop, 0); };

    return (
      <div className={mobile ? 'mobile-content' : undefined}>
        <Header route={route} onNav={nav} mobile={mobile} />
        <Screens route={route} lesson={lesson} nav={nav} open={open} mobile={mobile} />
        {mobile ? <MobileTabs route={route} nav={nav} /> : <Footer />}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
